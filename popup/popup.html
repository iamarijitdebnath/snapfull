<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapFull</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="header" id="popup-header">
    <div class="header-brand">
      <img src="../assets/icon32.png" alt="SnapFull" class="header-icon">
      <h1 class="header-title">SnapFull</h1>
    </div>
    <span class="header-version">v1.0</span>
  </header>

  <!-- ── Capture Buttons ─────────────────────────────────── -->
  <section class="capture-section" id="capture-section">
    <button class="btn btn-primary" id="btn-capture-full" title="Capture entire scrollable page">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <line x1="3" y1="9" x2="21" y2="9" />
        <line x1="3" y1="15" x2="21" y2="15" />
      </svg>
      <span>Capture Full Page</span>
    </button>

    <button class="btn btn-secondary" id="btn-capture-visible" title="Capture visible viewport only">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="4" width="20" height="16" rx="2" />
        <circle cx="12" cy="12" r="3" />
      </svg>
      <span>Capture Visible Area</span>
    </button>
  </section>

  <!-- ── Progress Bar ────────────────────────────────────── -->
  <section class="progress-section hidden" id="progress-section">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <p class="progress-text" id="progress-text">Preparing capture...</p>
  </section>

  <!-- ── Error Display ───────────────────────────────────── -->
  <section class="error-section hidden" id="error-section">
    <div class="error-card">
      <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <p class="error-text" id="error-text"></p>
      <button class="btn btn-sm" id="btn-dismiss-error">Dismiss</button>
    </div>
  </section>

  <!-- ── Settings Toggle ─────────────────────────────────── -->
  <section class="settings-toggle" id="settings-toggle-section">
    <button class="settings-toggle-btn" id="btn-toggle-settings">
      <svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>Settings</span>
      <svg class="chevron" id="settings-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
  </section>

  <!-- ── Settings Panel ──────────────────────────────────── -->
  <section class="settings-panel hidden" id="settings-panel">
    <!-- Format -->
    <div class="setting-row">
      <label class="setting-label" for="setting-format">Output Format</label>
      <select class="setting-select" id="setting-format">
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
        <option value="pdf">PDF</option>
      </select>
    </div>

    <!-- JPEG Quality -->
    <div class="setting-row" id="jpeg-quality-row">
      <label class="setting-label" for="setting-quality">JPEG Quality</label>
      <div class="setting-range-container">
        <input type="range" class="setting-range" id="setting-quality" min="10" max="100" value="92" step="1">
        <span class="setting-range-value" id="quality-value">92%</span>
      </div>
    </div>

    <!-- Capture Delay -->
    <div class="setting-row">
      <label class="setting-label" for="setting-delay">Capture Delay</label>
      <div class="setting-range-container">
        <input type="range" class="setting-range" id="setting-delay" min="50" max="1000" value="150" step="50">
        <span class="setting-range-value" id="delay-value">150ms</span>
      </div>
    </div>

    <!-- Auto Download -->
    <div class="setting-row">
      <label class="setting-label" for="setting-autodownload">Auto-Download</label>
      <label class="switch">
        <input type="checkbox" id="setting-autodownload">
        <span class="switch-slider"></span>
      </label>
    </div>
  </section>

  <!-- ── History Section ─────────────────────────────────── -->
  <section class="history-section" id="history-section">
    <div class="history-header">
      <h2 class="history-title">Recent Captures</h2>
      <button class="btn btn-ghost btn-sm" id="btn-clear-history" title="Clear all history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear
      </button>
    </div>
    <div class="history-grid" id="history-grid">
      <!-- Populated by JS -->
    </div>
    <p class="history-empty hidden" id="history-empty">No screenshots yet. Capture your first page!</p>
  </section>

  <!-- ── Footer ──────────────────────────────────────────── -->
  <footer class="footer">
    <div class="shortcuts">
      <span class="shortcut-item">
        <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd> Full Page
      </span>
      <span class="shortcut-item">
        <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>V</kbd> Visible
      </span>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>

</html>
