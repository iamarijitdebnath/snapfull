<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapFull — Editor</title>
  <link rel="stylesheet" href="editor.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <!-- ── Top Bar ─────────────────────────────────────────── -->
  <header class="editor-topbar" id="editor-topbar">
    <div class="topbar-left">
      <img src="../assets/icon32.png" alt="SnapFull" class="topbar-logo">
      <h1 class="topbar-title">SnapFull Editor</h1>
    </div>

    <div class="topbar-center">
      <!-- Zoom Controls -->
      <div class="zoom-controls">
        <button class="tool-btn" id="btn-zoom-out" title="Zoom Out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <circle cx="11" cy="11" r="8"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <span class="zoom-level" id="zoom-level">100%</span>
        <button class="tool-btn" id="btn-zoom-in" title="Zoom In">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <circle cx="11" cy="11" r="8"/>
            <line x1="11" y1="8" x2="11" y2="14"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <button class="tool-btn" id="btn-zoom-fit" title="Fit to Window">Fit</button>
        <button class="tool-btn" id="btn-zoom-100" title="Actual Size">1:1</button>
      </div>
    </div>

    <div class="topbar-right">
      <!-- Undo / Redo -->
      <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>
      <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Y)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/>
        </svg>
      </button>

      <div class="topbar-separator"></div>

      <!-- Export Buttons -->
      <button class="btn-export" id="btn-save-png" title="Save as PNG">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        PNG
      </button>

      <button class="btn-export" id="btn-save-jpeg" title="Save as JPEG">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        JPEG
      </button>

      <button class="btn-export" id="btn-save-pdf" title="Save as PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        PDF
      </button>

      <button class="btn-export btn-export-accent" id="btn-copy-clipboard" title="Copy to Clipboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copy
      </button>
    </div>
  </header>

  <!-- ── Main Layout ─────────────────────────────────────── -->
  <div class="editor-layout">
    <!-- Left Toolbar -->
    <aside class="editor-toolbar" id="editor-toolbar">
      <div class="toolbar-group">
        <button class="tool-btn tool-active" id="tool-select" title="Select / Move (V)" data-tool="select">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
          </svg>
        </button>

        <button class="tool-btn" id="tool-crop" title="Crop (C)" data-tool="crop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"/>
            <path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group">
        <button class="tool-btn" id="tool-text" title="Text (T)" data-tool="text">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <polyline points="4 7 4 4 20 4 20 7"/>
            <line x1="9" y1="20" x2="15" y2="20"/>
            <line x1="12" y1="4" x2="12" y2="20"/>
          </svg>
        </button>

        <button class="tool-btn" id="tool-arrow" title="Arrow (A)" data-tool="arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <line x1="5" y1="19" x2="19" y2="5"/>
            <polyline points="12 5 19 5 19 12"/>
          </svg>
        </button>

        <button class="tool-btn" id="tool-rect" title="Rectangle (R)" data-tool="rect">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          </svg>
        </button>

        <button class="tool-btn" id="tool-circle" title="Circle (O)" data-tool="circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="12" cy="12" r="10"/>
          </svg>
        </button>

        <button class="tool-btn" id="tool-line" title="Line (L)" data-tool="line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <line x1="5" y1="19" x2="19" y2="5"/>
          </svg>
        </button>

        <button class="tool-btn" id="tool-draw" title="Freehand Draw (D)" data-tool="draw">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M12 19l7-7 3 3-7 7-3-3z"/>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
            <path d="M2 2l7.586 7.586"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group">
        <button class="tool-btn" id="tool-blur" title="Blur Region (B)" data-tool="blur">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="12" cy="12" r="10" stroke-dasharray="3 3"/>
            <circle cx="12" cy="12" r="4"/>
          </svg>
        </button>

        <button class="tool-btn" id="tool-highlight" title="Highlight (H)" data-tool="highlight">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <rect x="3" y="8" width="18" height="8" rx="1" fill="currentColor" opacity="0.3"/>
            <rect x="3" y="8" width="18" height="8" rx="1"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Color Picker -->
      <div class="toolbar-group toolbar-group-options">
        <label class="color-picker-label" title="Color">
          <input type="color" id="tool-color" value="#ef4444" class="color-picker-input">
          <span class="color-picker-swatch" id="color-swatch"></span>
        </label>

        <!-- Stroke Width -->
        <div class="stroke-control">
          <label class="stroke-label" for="tool-stroke-width" title="Stroke Width">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <line x1="3" y1="12" x2="21" y2="12" stroke-width="1"/>
            </svg>
          </label>
          <input type="range" id="tool-stroke-width" min="1" max="20" value="3" class="stroke-range">
          <span class="stroke-value" id="stroke-value">3px</span>
        </div>

        <!-- Font Size (for text tool) -->
        <div class="font-control hidden" id="font-control">
          <label class="stroke-label" for="tool-font-size">Aa</label>
          <input type="range" id="tool-font-size" min="12" max="72" value="24" class="stroke-range">
          <span class="stroke-value" id="font-size-value">24px</span>
        </div>
      </div>

      <!-- Delete Selected -->
      <div class="toolbar-group" style="margin-top:auto">
        <button class="tool-btn tool-btn-danger" id="btn-delete" title="Delete Selected (Del)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Canvas Container -->
    <main class="editor-canvas-wrapper" id="canvas-wrapper">
      <div class="canvas-container" id="canvas-container">
        <canvas id="editor-canvas"></canvas>
      </div>

      <!-- Crop Overlay (shown when crop tool is active) -->
      <div class="crop-overlay hidden" id="crop-overlay">
        <div class="crop-actions">
          <button class="btn-crop-action btn-crop-confirm" id="btn-crop-confirm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Apply Crop
          </button>
          <button class="btn-crop-action btn-crop-cancel" id="btn-crop-cancel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            Cancel
          </button>
        </div>
      </div>

      <!-- Toast Notification -->
      <div class="toast hidden" id="toast">
        <span class="toast-text" id="toast-text"></span>
      </div>

      <!-- Loading Overlay -->
      <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading image...</p>
      </div>
    </main>
  </div>

  <!-- ── Fabric.js (bundled inline for CSP compliance) ─── -->
  <script src="../lib/fabric.min.js"></script>
  <script src="editor.js"></script>
</body>

</html>
